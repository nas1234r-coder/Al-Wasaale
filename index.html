<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المعلمين - الوسائل التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #2c3e50; font-size: 1.6rem; margin: 0; }
        .header p { color: #7f8c8d; font-size: 0.9rem; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 700px; }
        
        .btn { padding: 20px 10px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; text-align: center; position: relative; overflow: hidden; box-shadow: 0 6px 0 #333, 0 8px 10px rgba(0,0,0,0.3); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .btn::after { content: "۞"; position: absolute; top: 2px; right: 8px; font-size: 1rem; opacity: 0.4; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.25); box-shadow: 0 8px 0 #222, 0 10px 15px rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #333, 0 2px 5px rgba(0,0,0,0.2); }

        /* الألوان للمواد */
        .islamic { background: linear-gradient(135deg, #2c3e50, #4a69bd); }
        .arabic { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .math { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .science { background: linear-gradient(135deg, #2980b9, #3498db); }
        .art { background: linear-gradient(135deg, #f39c12, #f1c40f); }
        .social { background: linear-gradient(135deg, #7f8c8d, #95a5a6); }
        .sports { background: linear-gradient(135deg, #d35400, #e67e22); }
        .music { background: linear-gradient(135deg, #8e44ad, #9b59b6); }

        /* منطقة عرض الصور */
        #media-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #displayed-image { max-width: 90%; max-height: 75vh; border-radius: 15px; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .nav-controls { margin-top: 20px; display: flex; gap: 10px; }
        .nav-btn { padding: 12px 25px; border-radius: 8px; border: none; background: #2c3e50; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="header">
            <h1>نَماذجُ مِنَ الْوَسائلِ التَّعليميَّةِ</h1>
            <p>دائرة تطوير الأداء المدرسي </p>
        </div>

        <div class="menu-grid">
            <button class="btn islamic" onclick="openMedia('islamic')">التربية الإسلامية</button>
            <button class="btn arabic" onclick="openMedia('arabic')">اللغة العربية</button>
            <button class="btn math" onclick="openMedia('math')">الرياضيات</button>
            <button class="btn science" onclick="openMedia('science')">العلوم</button>
            <button class="btn art" onclick="openMedia('art')">الفنون التشكيلية</button>
            <button class="btn social" onclick="openMedia('social')">الدراسات الاجتماعية</button>
            <button class="btn sports" onclick="openMedia('sports')">التربية الرياضية</button>
            <button class="btn music" onclick="openMedia('music')">الموسيقى</button>
        </div>
    </div>

    <div id="media-viewer">
        <img id="displayed-image" src="" alt="صورة الوسيلة">
        <div class="nav-controls">
            <button class="nav-btn" onclick="changeSlide(1)">التالي</button>
            <button class="nav-btn" style="background:#7f8c8d" onclick="closeMedia()">الرئيسية</button>
            <button class="nav-btn" onclick="changeSlide(-1)">السابق</button>
        </div>
    </div>

    <script>
        let currentFolder = '';
        let currentIdx = 1;

        function openMedia(folder) {
            currentFolder = folder;
            currentIdx = 1;
            updateImage();
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('media-viewer').style.display = 'flex';
        }

        function updateImage() {
            // ملاحظة: تأكد أن الصور داخل المجلدات بصيغة png
            document.getElementById('displayed-image').src = `images/${currentFolder}/${currentIdx}.png`;
        }

        function changeSlide(dir) {
            currentIdx += dir;
            if (currentIdx > 4) currentIdx = 1;
            if (currentIdx < 1) currentIdx = 4;
            updateImage();
        }

        function closeMedia() {
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('media-viewer').style.display = 'none';
        }
    </script>
</body>
</html>
